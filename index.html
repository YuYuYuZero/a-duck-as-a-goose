<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="description" content="《指鸭为鹅》是一款虚构的烤腿摊求生模拟器：鹅腿不够的夜晚，你会上什么腿？7天经营，14种结局。">
<meta property="og:title" content="指鸭为鹅 🪿 烤腿摊求生实录">
<meta property="og:description" content="鹅腿不够的夜晚，你会上什么腿？进货→出摊→被盘问→上热搜，7夜经营，14种结局。良心选配，售完即止。">
<meta property="og:type" content="website">
<title>指鸭为鹅 🪿 烤腿摊求生实录</title>
<style>
:root{
  --bg:#0b1020; --bg2:#141b33;
  --paper:#fff7ea; --paper2:#f6ecd9; --ink:#2b2117; --ink2:#7a6a55;
  --accent:#ff8a2a; --accent2:#ffb347; --red:#e5484d; --green:#3da35d; --jade:#7ec97e;
  --gold:#ffd166; --line:#e7d9bf;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;
  background:
    radial-gradient(1100px 500px at 80% -10%, rgba(255,138,42,.18), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(80,110,255,.14), transparent 60%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:#f3ead9; min-height:100dvh; overflow-x:hidden;
}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .8s;
  background:radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(229,72,77,.35) 100%)}
body.danger #vignette{opacity:1}
.screen{max-width:600px;margin:0 auto;padding:18px 16px 40px;min-height:100dvh}
[hidden]{display:none!important}

/* ---------- buttons ---------- */
.btn{border:none;cursor:pointer;font-family:inherit;border-radius:14px;transition:transform .08s,box-shadow .2s,filter .2s;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#ff6d1f);color:#fff;font-size:19px;font-weight:700;
  padding:15px 34px;box-shadow:0 6px 22px rgba(255,120,30,.45), inset 0 1px 0 rgba(255,255,255,.35);letter-spacing:1px}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:rgba(255,255,255,.08);color:#e8dcc4;border:1px solid rgba(255,255,255,.18);padding:9px 16px;font-size:14px}
.btn-ghost:hover{background:rgba(255,255,255,.15)}

/* ---------- landing ---------- */
#landing{display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;gap:14px;padding-top:42px}
.title-art{position:relative;height:120px;width:160px;margin-bottom:-6px}
.title-art .goose{position:absolute;font-size:96px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 10px 24px rgba(255,150,60,.35));animation:bob 3s ease-in-out infinite}
.title-art .duck{position:absolute;font-size:44px;right:-16px;bottom:-4px;opacity:.92;animation:peek 5s ease-in-out infinite}
.title-art .shadow-q{position:absolute;left:-18px;top:-2px;font-size:30px;opacity:.7;animation:bob 3s .6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-9px)}}
@keyframes peek{0%,55%,100%{transform:translateY(0) rotate(0)}65%,85%{transform:translateY(-10px) rotate(-12deg)}}
h1.logo{font-size:58px;letter-spacing:10px;font-weight:900;
  background:linear-gradient(180deg,#ffe9c2,#ffb347 55%,#ff8a2a);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 4px 30px rgba(255,150,50,.25)}
.sub{font-size:14px;color:#cdbfa3;letter-spacing:3px}
.lead{font-size:15px;line-height:1.9;color:#efe5cf;margin-top:6px}
.lead em{color:var(--accent2);font-style:normal}
.meta-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.meta-chips span{font-size:12px;color:#d8c9a8;border:1px solid rgba(255,255,255,.18);border-radius:99px;padding:4px 12px;background:rgba(255,255,255,.05)}
.landing-quote{margin-top:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px 16px;font-size:13px;color:#e8dcc4;max-width:420px}
.landing-quote b{color:var(--accent2);font-weight:600;margin-right:6px}
.dots i{display:inline-block;width:4px;height:4px;border-radius:50%;background:#cdbfa3;margin-right:3px;animation:blink 1.2s infinite}
.dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#dexWrap{margin-top:18px;width:100%;max-width:460px}
#dexWrap h3{font-size:13px;color:#cdbfa3;font-weight:600;letter-spacing:2px;margin-bottom:8px}
#dexGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.dex-cell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 4px;font-size:11px;color:#e8dcc4;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:58px;justify-content:center}
.dex-cell .de{font-size:20px}
.dex-cell.locked{opacity:.38;filter:grayscale(1)}
.foot{margin-top:26px;font-size:11px;color:#8d8268;line-height:1.8;max-width:440px}

/* ---------- game header ---------- */
#gameHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.day-box{display:flex;flex-direction:column;gap:3px}
.day-line{display:flex;align-items:baseline;gap:8px}
#dayLabel{font-size:18px;font-weight:800;color:var(--gold)}
#phaseChip{font-size:11px;background:rgba(255,170,60,.18);border:1px solid rgba(255,170,60,.45);color:var(--accent2);border-radius:99px;padding:2px 10px}
#placeLabel{font-size:11px;color:#b9ab8d}
.day-dots{display:flex;gap:5px}
.day-dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18)}
.day-dots i.on{background:var(--accent)}
.day-dots i.now{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.icon-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#e8dcc4;width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer}

/* ---------- stats ---------- */
#statsBar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.stat{position:relative;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:11px;padding:7px 6px 8px;text-align:center;overflow:visible}
.stat .si{font-size:15px}
.stat .sn{font-size:10px;color:#bdaf91;margin-top:1px}
.stat .sv{font-size:14px;font-weight:800;color:#fff;margin-top:1px;font-variant-numeric:tabular-nums}
.stat .bar{height:3px;border-radius:3px;background:rgba(255,255,255,.12);margin-top:5px;overflow:hidden}
.stat .bar i{display:block;height:100%;border-radius:3px;background:var(--accent2);transition:width .5s ease;width:50%}
.stat.s-risk .bar i{background:var(--red)}
.stat.s-trust .bar i{background:#ff9db0}
.stat.s-conscience .bar i{background:var(--jade)}
.stat.s-hype .bar i{background:#ffd166}
.stat.pulse{animation:pulse .5s}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.stat.danger{border-color:var(--red);box-shadow:0 0 14px rgba(229,72,77,.5);animation:dangerGlow 1.2s infinite}
@keyframes dangerGlow{0%,100%{box-shadow:0 0 8px rgba(229,72,77,.35)}50%{box-shadow:0 0 18px rgba(229,72,77,.7)}}
.fly-delta{position:absolute;left:50%;top:-6px;transform:translateX(-50%);font-size:12px;font-weight:800;pointer-events:none;animation:flyup 1.1s ease-out forwards;white-space:nowrap;z-index:5}
.fly-delta.up{color:#7ee787}.fly-delta.down{color:#ff7b81}
@keyframes flyup{0%{opacity:0;transform:translate(-50%,4px)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-22px)}}

/* ---------- paper cards ---------- */
.paper{background:linear-gradient(180deg,var(--paper),var(--paper2));color:var(--ink);border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.8);padding:18px;position:relative}
.paper h2{font-size:20px;font-weight:800;margin-bottom:4px}
.kicker{display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:8px;letter-spacing:.5px}
.paper p.desc{font-size:14px;line-height:1.85;color:#4a3c2c;margin:8px 0}
.paper .hl{color:#c2410c;font-weight:700}
.stamp{position:absolute;top:14px;right:14px;font-size:10px;color:#b4582a;border:1.5px solid #c96a39;border-radius:6px;padding:2px 7px;transform:rotate(6deg);opacity:.75;font-weight:700;letter-spacing:1px}
.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

/* ---------- supply ---------- */
.supply-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px 12px;margin-top:9px}
.supply-row .info{display:flex;align-items:center;gap:10px}
.supply-row .le{font-size:26px}
.supply-row .ln{font-size:14px;font-weight:700}
.supply-row .ld{font-size:11px;color:var(--ink2);margin-top:1px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:44px;height:44px;border-radius:11px;border:1px solid #d8c5a5;background:#fff3df;font-size:20px;font-weight:700;color:#9a5b22;cursor:pointer}
.stepper button:active{transform:scale(.92)}
.stepper .qty{min-width:26px;text-align:center;font-weight:800;font-size:16px}
.price-opts{display:flex;gap:8px;margin-top:9px}
.price-opt{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.price-opt .pv{font-weight:800;font-size:16px}
.price-opt .pn{font-size:10px;color:var(--ink2);margin-top:2px}
.price-opt.sel{border-color:var(--accent);background:#fff3e2;box-shadow:0 0 0 2px rgba(255,138,42,.25)}
.price-opt.disabled{opacity:.4;pointer-events:none}
.cost-line{display:flex;justify-content:space-between;align-items:center;margin-top:13px;font-size:14px}
.cost-line b{font-size:18px}
.go-btn{width:100%;margin-top:12px;padding:13px;font-size:17px}
.warn-line{font-size:12px;color:var(--red);margin-top:6px;text-align:center;min-height:16px}

/* ---------- stall / customer ---------- */
.stock-chips{display:flex;gap:7px;margin-bottom:10px}
.stock-chip{flex:1;text-align:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:5px 2px;font-size:12px;color:#e8dcc4}
.stock-chip b{font-size:15px;color:#fff;display:block}
.stock-chip.empty{opacity:.4}
.queue-line{font-size:12px;color:#c9bb9d;margin-bottom:8px;letter-spacing:1px;min-height:18px}
.cust-card{animation:slidein .35s ease}
@keyframes slidein{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.cust-top{display:flex;gap:13px;align-items:center}
.avatar{width:64px;height:64px;border-radius:18px;background:linear-gradient(145deg,#ffe9c8,#ffd9a1);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:inset 0 0 0 2px rgba(190,120,40,.25);flex:none}
.cust-name{font-size:17px;font-weight:800}
.cust-badges{display:flex;gap:10px;margin-top:4px;font-size:12px;color:#7a5a35}
.cust-badges .bb{background:#fff;border:1px solid var(--line);border-radius:7px;padding:2px 7px}
.cust-line{margin-top:11px;background:#fff;border:1px solid var(--line);border-radius:0 14px 14px 14px;padding:10px 13px;font-size:14px;line-height:1.7;color:#3c2f20;position:relative}
.serve-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}
.serve-btn{border:none;border-radius:13px;padding:11px 6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .08s,filter .15s;line-height:1.35}
.serve-btn small{display:block;font-size:10px;font-weight:500;opacity:.75;margin-top:2px}
.serve-btn:active{transform:scale(.95)}
.serve-btn:disabled{opacity:.35;pointer-events:none}
.sb-goose{background:linear-gradient(135deg,#ffe3b3,#ffd089);color:#7a4a12}
.sb-duck{background:linear-gradient(135deg,#ffd0a6,#ff9e58);color:#6b3208}
.sb-green{background:linear-gradient(135deg,#d4f3c4,#9fdd8e);color:#2f5e1f}
.sb-duckh{background:linear-gradient(135deg,#e8f1ff,#c3d9f7);color:#1e4f91}
.sb-no{background:#efe6d3;color:#6b5a41}
.reaction{margin-top:12px;border-radius:12px;padding:10px 13px;font-size:13.5px;line-height:1.7;animation:slidein .3s ease}
.reaction.ok{background:#eef8ea;border:1px solid #bfe3b0;color:#2f5e1f}
.reaction.bad{background:#fdebec;border:1px solid #f3b6ba;color:#8c2126}
.reaction.mid{background:#fff7e0;border:1px solid #ecd9a0;color:#7a5a12}

/* ---------- quiz modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,10,22,.72);backdrop-filter:blur(3px);z-index:90;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadein .25s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.quiz-card{max-width:460px;width:100%;animation:popin .3s cubic-bezier(.2,1.4,.4,1)}
@keyframes popin{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.quiz-tag{font-size:11px;color:#b4582a;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.quiz-q{font-size:17px;font-weight:800;line-height:1.65}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.quiz-opt{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;line-height:1.6;cursor:pointer;font-family:inherit;color:var(--ink);transition:all .12s}
.quiz-opt:hover{border-color:var(--accent);background:#fff7ea}
.quiz-opt:active{transform:scale(.98)}

/* ---------- event ---------- */
.choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.choice{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;cursor:pointer;font-family:inherit;transition:all .12s}
.choice:hover{border-color:var(--accent);background:#fff7ea}
.choice:active{transform:scale(.98)}
.choice .ct{font-size:14.5px;font-weight:700;color:var(--ink)}
.choice .ch{font-size:12px;color:var(--ink2);margin-top:3px;line-height:1.5}
.choice .cfx{margin-top:6px;font-size:11.5px;color:#9a6b2f;letter-spacing:.5px}
.result-box{margin-top:14px;background:#fffdf6;border:1px dashed #d8b97f;border-radius:13px;padding:12px 14px;animation:slidein .3s}
.result-box .rt{font-size:11px;color:#b4582a;font-weight:700;letter-spacing:2px;margin-bottom:5px}
.result-box p{font-size:14px;line-height:1.8;color:#4a3c2c}
.cont-btn{width:100%;margin-top:13px;padding:12px;font-size:15px}

/* ---------- chat feed ---------- */
#chatWrap{margin-top:14px;background:rgba(10,14,30,.55);border:1px solid rgba(255,255,255,.12);border-radius:15px;padding:10px 12px}
#chatHead{display:flex;justify-content:space-between;font-size:11px;color:#b9ab8d;letter-spacing:1px;margin-bottom:6px}
#chatFeed{height:128px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
.chat-msg{font-size:12.5px;line-height:1.55;color:#ded2b8;animation:chatin .3s ease}
.chat-msg b{color:#9ecbff;font-weight:600}
.chat-msg.hot b{color:#ffb070}
.chat-msg.sys{color:#8fa3c7;font-style:italic}
@keyframes chatin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chat-reply-wrap{display:flex;flex-direction:column;gap:4px;margin:4px 0;animation:chatin .3s ease}
.chat-reply-btn{text-align:left;background:rgba(255,138,42,.12);border:1px solid rgba(255,138,42,.35);border-radius:8px;padding:5px 9px;font-size:11.5px;color:#ffe0b3;cursor:pointer;font-family:inherit;transition:all .12s}
.chat-reply-btn:hover{background:rgba(255,138,42,.25);border-color:rgba(255,138,42,.6)}
.chat-reply-btn:active{transform:scale(.97)}

/* ---------- summary ---------- */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sum-cell{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;font-size:12px;color:var(--ink2)}
.sum-cell b{display:block;font-size:17px;color:var(--ink);margin-top:2px}

/* ---------- ending ---------- */
#endingScr{display:flex;flex-direction:column;align-items:center;padding-top:34px}
.end-card{max-width:480px;width:100%;text-align:center;padding:26px 22px}
.end-emoji{font-size:64px;animation:bob2 2.6s ease-in-out infinite;display:inline-block}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.end-grade{display:inline-block;font-size:12px;font-weight:800;border-radius:99px;padding:3px 14px;margin-top:8px;letter-spacing:2px}
.g-S{background:#ffe9b0;color:#8a5a00;border:1px solid #e3b94f}
.g-A{background:#e3f4d9;color:#33691e;border:1px solid #a5cf8d}
.g-B{background:#e3ecf8;color:#1e4f91;border:1px solid #9ebde3}
.g-C{background:#efe6e0;color:#6d4c41;border:1px solid #cfb3a3}
.end-title{font-size:30px;font-weight:900;margin-top:10px;letter-spacing:2px}
.end-sub{font-size:14px;color:#6b5a41;margin-top:7px;line-height:1.8}
.end-quote{margin:16px auto 0;max-width:360px;font-size:14px;color:#8a5a2a;border-top:1px dashed #d8b97f;border-bottom:1px dashed #d8b97f;padding:11px 6px;line-height:1.8}
.end-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:16px}
.end-stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 4px;font-size:11px;color:var(--ink2)}
.end-stat b{display:block;font-size:15px;color:var(--ink)}
.badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px}
.badge{font-size:11.5px;background:#fff3df;border:1px solid #e3c896;color:#7a4a12;border-radius:99px;padding:4px 11px;font-weight:600}
.end-btns{display:flex;flex-direction:column;gap:10px;margin-top:22px;width:100%}
.end-btns .btn-ghost{padding:14px;font-size:16px;font-weight:700;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);color:#ffe9c2}
.end-btns .btn-ghost:hover{background:rgba(255,255,255,.2)}
.end-btns .btn-primary{padding:15px;font-size:17px}
.end-new{font-size:11px;color:#b4582a;font-weight:700;letter-spacing:1px;margin-top:10px}
.confetti{position:fixed;top:-30px;font-size:22px;z-index:60;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.6}}

/* ---------- modal generic ---------- */
.modal-card{max-width:440px;width:100%;max-height:80dvh;overflow-y:auto}
.modal-card h3{font-size:18px;font-weight:800;margin-bottom:10px}
.modal-card .mb{font-size:13.5px;line-height:1.9;color:#4a3c2c}
.modal-card .mb li{margin:7px 0 7px 18px}
.modal-close{width:100%;margin-top:14px;padding:11px;font-size:14px;background:#3a2c1a;color:#ffe9c2}

@media (min-width:880px){
  .screen{max-width:920px}
  #gameBody{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
  #chatWrap{margin-top:0;position:sticky;top:14px}
  #chatFeed{height:380px}
}
</style>
</head>
<body>
<div id="vignette"></div>

<!-- ============ LANDING ============ -->
<section id="landing" class="screen">
  <div class="title-art">
    <span class="shadow-q">❓</span>
    <span class="goose">🪿</span>
    <span class="duck">🦆</span>
  </div>
  <h1 class="logo">指鸭为鹅</h1>
  <p class="sub">烤 腿 摊 求 生 实 录 · 从 五 道 口 到 C B D</p>
  <p class="lead">"我曾经也只想卖热乎的鹅腿。<br>
  可<em>鹅腿不够</em>的那个晚上，队伍排到了路灯尽头，<br>
  而冷链车上的鸭腿……正好打折。"</p>
  <div class="meta-chips">
    <span>🗓 7天经营</span><span>🎭 14种结局</span><span>🗣 9段盘问</span><span>😇 良心选配</span>
  </div>
  <button id="btnStart" class="btn btn-primary">🔥 开始出摊</button>

  <div class="row">

    <button class="btn btn-ghost" data-modal="tips">🤫 老张的悄悄话</button>

  </div>

  </div>

    <div id="dexGrid"></div>

  灵感源自公共新闻事件的网络讨论，致敬《鹅难财》与《今天你卖的是什么腿？》。<br>请支持诚信经营，吃腿先看品类。</p>
</section>
